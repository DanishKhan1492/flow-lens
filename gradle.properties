# ─────────────────────────────────────────────────────────────────────────────
# Traffic Cam — Gradle Properties
# ─────────────────────────────────────────────────────────────────────────────

# Build performance
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true

# ─── Dependency versions ─────────────────────────────────────────────────────
# Update springBootVersion to a newer milestone/RC/GA when available:
#   https://repo.spring.io/milestone/org/springframework/boot/
springBootVersion=4.0.0-M3

# GraalVM native build tools
graalvmBuildToolsVersion=0.10.6

# ByteBuddy (agent only — runs on regular JVM, not native)
byteBuddyVersion=1.15.11

# Shadow / fat-jar plugin for the agent JAR (community fork — supports Java 21 bytecode)
shadowVersion=8.1.8
